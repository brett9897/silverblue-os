name: Build and Push Custom OS Image
on:
  schedule:
    - cron: "0 0 * * 1" # Automatically rebuild every Monday at midnight to pull latest security patches
  push:
    branches:
      - master
    paths:
      - 'config/**'
      - '.github/workflows/**'
  workflow_dispatch: # Allows you to manually click "Run Workflow" in the GitHub UI

env:
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  bluebuild:
    name: Build Custom Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Diagnostic - Check Secret Visibility
        run: |
          if [ -z "${{ secrets.SIGNING_SECRET }}" ]; then
            echo "❌ ERROR: The SIGNING_SECRET is completely empty. GitHub Actions cannot see it."
            exit 1
          else
            echo "✅ SUCCESS: The secret is securely populated."
          fi

      - name: Diagnostic - Check Public Key
        run: |
          if [ ! -f "cosign.pub" ]; then
            echo "❌ ERROR: cosign.pub is missing from the root of the repository."
            exit 1
          else
            echo "✅ SUCCESS: cosign.pub found."
          fi

      - name: Build Custom Image
        uses: blue-build/github-action@v1
        with:
          recipe: 'config/recipe.yml'
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
